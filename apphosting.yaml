# Firebase App Hosting — configuración del backend (Cloud Run).
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Escala a cero cuando no hay tráfico → costo ~$0 en reposo.
  minInstances: 0
  maxInstances: 1
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Variables de entorno.
# - Los valores NO se ponen acá; se guardan en Secret Manager y se referencian con `secret:`.
#   Crear cada uno con:  firebase apphosting:secrets:set NOMBRE
#   (o en la consola: App Hosting → backend → Variables y secretos)
# - `availability: BUILD` es obligatorio para las NEXT_PUBLIC_* (se inlinean en el bundle del cliente).
# - Las del servidor (admin, sheets, vapid privado, cron) sólo necesitan RUNTIME.
env:
  # ── Firebase Web SDK (públicas, necesarias en build) ──
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability: [BUILD, RUNTIME]
  # ── Dueño + push público (necesarias en build) ──
  - variable: NEXT_PUBLIC_OWNER_EMAIL
    secret: NEXT_PUBLIC_OWNER_EMAIL
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_OWNER_UID
    secret: NEXT_PUBLIC_OWNER_UID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_VAPID_PUBLIC_KEY
    secret: NEXT_PUBLIC_VAPID_PUBLIC_KEY
    availability: [BUILD, RUNTIME]
  # ── Servidor / API routes (sólo runtime) ──
  - variable: FIREBASE_SERVICE_ACCOUNT_JSON
    secret: FIREBASE_SERVICE_ACCOUNT_JSON
    availability: [RUNTIME]
  - variable: GOOGLE_SERVICE_ACCOUNT_JSON
    secret: GOOGLE_SERVICE_ACCOUNT_JSON
    availability: [RUNTIME]
  - variable: GOOGLE_SPREADSHEET_ID
    secret: GOOGLE_SPREADSHEET_ID
    availability: [RUNTIME]
  - variable: VAPID_PUBLIC_KEY
    secret: VAPID_PUBLIC_KEY
    availability: [RUNTIME]
  - variable: VAPID_PRIVATE_KEY
    secret: VAPID_PRIVATE_KEY
    availability: [RUNTIME]
  - variable: VAPID_SUBJECT
    secret: VAPID_SUBJECT
    availability: [RUNTIME]
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability: [RUNTIME]
  - variable: OWNER_UID
    secret: OWNER_UID
    availability: [RUNTIME]
